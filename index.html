<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guess My Number</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --danger: #ef4444;
      --warn: #f59e0b;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #1f2937, var(--bg));
      color: var(--text); min-height: 100vh; display: grid; place-items: center; padding: 24px;
    }
    .wrap {
      width: min(760px, 95vw); background: var(--card); border-radius: 20px; box-shadow: var(--shadow);
      padding: 28px; border: 1px solid rgba(255,255,255,0.06);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 16px; color: var(--muted); }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat { background: rgba(255,255,255,0.04); padding: 10px 14px; border-radius: 12px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    input[type="number"] {
      flex: 1; min-width: 140px; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
      background: #0b1020; color: var(--text); font-size: 16px; outline: none;
    }
    button {
      padding: 12px 16px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600;
      background: var(--accent); color: #052e16; transition: transform 0.05s ease;
    }
    button:active { transform: scale(0.98); }
    .secondary { background: #1f2937; color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
    .message { font-size: 18px; min-height: 28px; }
    .hint { color: var(--muted); }
    .chip { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: 12px; }
    .ok { background: rgba(34,197,94,0.15); color: #86efac; }
    .warn { background: rgba(245,158,11,0.15); color: #fde68a; }
    .bad { background: rgba(239,68,68,0.15); color: #fecaca; }
    .footer { margin-top: 10px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Guess My Number</h1>
    <p>Can you guess the secret number between <strong>1</strong> and <strong>100</strong>?</p>

    <div class="stats">
      <div class="stat">Attempts left: <strong id="attempts">10</strong></div>
      <div class="stat">Best score: <strong id="best">0</strong></div>
      <div class="stat">Range: <strong id="range">1 - 100</strong></div>
    </div>

    <div class="grid">
      <div class="controls">
        <input id="guess" type="number" min="1" max="100" placeholder="Enter your guess" />
        <button id="check">Check</button>
        <button id="reset" class="secondary">New Game</button>
      </div>

      <div class="message" id="message">Make your first guess.</div>
      <div class="hint" id="hint">Tip: try narrowing the range.</div>
    </div>

    <div class="footer">Single‑file game. Drop this HTML anywhere and it runs.</div>
  </div>

  <script>
    const min = 1;
    const max = 100;
    const maxAttempts = 10;

    let secret = 0;
    let attemptsLeft = maxAttempts;
    let bestScore = Number(localStorage.getItem('bestScore') || '0');

    const attemptsEl = document.getElementById('attempts');
    const bestEl = document.getElementById('best');
    const rangeEl = document.getElementById('range');
    const messageEl = document.getElementById('message');
    const hintEl = document.getElementById('hint');
    const guessEl = document.getElementById('guess');

    function setMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = 'message';
      if (type) messageEl.classList.add(type);
    }

    function newGame() {
      secret = Math.floor(Math.random() * (max - min + 1)) + min;
      attemptsLeft = maxAttempts;
      attemptsEl.textContent = attemptsLeft;
      bestEl.textContent = bestScore;
      rangeEl.textContent = `${min} - ${max}`;
      guessEl.value = '';
      setMessage('Make your first guess.');
      hintEl.textContent = 'Tip: try narrowing the range.';
    }

    function updateBest() {
      const score = attemptsLeft;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('bestScore', String(bestScore));
        bestEl.textContent = bestScore;
      }
    }

    function checkGuess() {
      const guess = Number(guessEl.value);
      if (!guess || guess < min || guess > max) {
        setMessage(`Enter a number between ${min} and ${max}.`, 'warn');
        return;
      }

      attemptsLeft -= 1;
      attemptsEl.textContent = attemptsLeft;

      if (guess === secret) {
        setMessage('Correct! You guessed the number.', 'ok');
        hintEl.textContent = 'Nice. Hit New Game to play again.';
        updateBest();
        return;
      }

      if (attemptsLeft <= 0) {
        setMessage(`Game over. The number was ${secret}.`, 'bad');
        hintEl.textContent = 'Try again with New Game.';
        return;
      }

      if (guess < secret) {
        setMessage('Too low. Try higher.', 'warn');
      } else {
        setMessage('Too high. Try lower.', 'warn');
      }
    }

    document.getElementById('check').addEventListener('click', checkGuess);
    document.getElementById('reset').addEventListener('click', newGame);
    guessEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkGuess();
    });

    newGame();
  </script>
</body>
</html>
